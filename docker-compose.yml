version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: expense_mgmt_db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-expense_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-expense_secret}
      POSTGRES_DB: ${DB_NAME:-expense_management}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-expense_user} -d ${DB_NAME:-expense_management}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: expense_mgmt_app
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-expense_user}
      - DB_PASSWORD=${DB_PASSWORD:-expense_secret}
      - DB_NAME=${DB_NAME:-expense_management}
      - DB_SSLMODE=disable
      - JWT_SECRET=${JWT_SECRET:-your_super_secret_jwt_key_here}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
    driver: local

